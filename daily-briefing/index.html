<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>贝塞尔每日简报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #dc2626;
  --dark: #1a1a1a;
  --mid: #555;
  --light: #888;
  --bg: #f5f5f5;
  --card: #fff;
  --border: #e8e8e8;
  --orange: #f97316;
  --green: #16a34a;
  --blue: #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--dark);
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding-bottom: 40px;
}
body::before { content: ''; display: block; height: 4px; background: var(--red); }

/* Header */
.hdr {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.hdr h1 { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; }
.hdr h1 span { color: var(--red); }
.hdr .date { font-size: 13px; color: var(--mid); white-space: nowrap; }

/* Tabs */
.tabs {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  position: sticky; top: 0; z-index: 10;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 20px;
  font-size: 14px; font-weight: 500;
  color: var(--mid); cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap; flex-shrink: 0;
  border-top: none; border-left: none; border-right: none;
  background: none; font-family: inherit;
  transition: color .15s;
}
.tab:hover { color: var(--dark); }
.tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.main { max-width: 680px; margin: 0 auto; padding: 16px; }

/* Block — 每个信息块 */
.block {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
}
.block-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.block-label.red   { color: var(--red); }
.block-label.orange{ color: var(--orange); }
.block-label.green { color: var(--green); }
.block-label.blue  { color: var(--blue); }
.block-label.gray  { color: var(--light); }

/* 关键词 pills */
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  background: #f3f4f6;
  color: var(--dark);
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 20px;
  line-height: 1.4;
}

/* 高亮框 */
.highlight {
  background: #fff7ed;
  border-left: 3px solid var(--orange);
  border-radius: 0 8px 8px 0;
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 500;
  color: #9a3412;
  line-height: 1.65;
}
.highlight.green {
  background: #f0fdf4;
  border-color: var(--green);
  color: #14532d;
}
.highlight.red {
  background: #fef2f2;
  border-color: var(--red);
  color: #7f1d1d;
}

/* 列表 */
.item-list { list-style: none; }
.item-list li {
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--dark);
  line-height: 1.6;
  display: flex;
  gap: 8px;
}
.item-list li:last-child { border-bottom: none; }
.item-list li::before {
  content: attr(data-n);
  color: var(--red);
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
  min-width: 18px;
}

/* 普通文字块 */
.text-block {
  font-size: 14px;
  color: var(--dark);
  line-height: 1.75;
}
.text-block p { margin-bottom: 8px; }
.text-block p:last-child { margin-bottom: 0; }
strong { font-weight: 600; }

/* 分节标题（巡检内） */
.section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--light);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 14px 0 6px;
}
.section-title:first-child { margin-top: 0; }

/* Empty / Error */
.empty { color: var(--light); font-size: 14px; font-style: italic; }
.error-box { background: #fef2f2; border-radius: 8px; padding: 14px; color: #991b1b; font-size: 14px; }
</style>
</head>
<body>

<header class="hdr">
  <h1>贝塞尔<span>每日简报</span></h1>
  <div class="date" id="hdr-date">加载中...</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('digest')">📅 昨日速览</button>
  <button class="tab" onclick="switchTab('patrol')">🔍 今日巡检</button>
  <button class="tab" onclick="switchTab('learn')">🧠 外部学习</button>
</div>

<div class="main" id="app">
  <div style="text-align:center;padding:60px 0;color:var(--light)">⏳ 加载中...</div>
</div>

<script>
let currentTab = 'digest';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['digest','patrol','learn'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name)?.classList.add('active');
}

function safe(s) { return s ? String(s) : ''; }

// 把多行文字转成段落列表
function toParas(s) {
  if (!s) return '';
  return safe(s)
    .split(/\n{2,}/)
    .map(p => p.trim().replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'))
    .filter(Boolean)
    .map(p => `<p>${p}</p>`)
    .join('');
}

// 把分号/换行分隔的列表渲染成 li
function toList(s) {
  if (!s) return '<span class="empty">无</span>';
  const items = safe(s)
    .split(/[；;\n]/)
    .map(x => x.replace(/^[①②③④⑤⑥⑦⑧\d]+[.、．]\s*/, '').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim())
    .filter(Boolean);
  if (!items.length) return '<span class="empty">无</span>';
  return `<ul class="item-list">${items.map((x,i) => `<li data-n="${i+1}">${x}</li>`).join('')}</ul>`;
}

// 关键词 → pills
function toPills(s) {
  if (!s) return '<span class="empty">无</span>';
  return `<div class="pills">${safe(s).split(/[、，,·・]/).map(x=>x.trim()).filter(Boolean).map(x=>`<span class="pill">${x}</span>`).join('')}</div>`;
}

function renderDigest(d) {
  if (!d) return '<div class="error-box">昨日日报数据缺失</div>';
  return `
    <div class="block">
      <div class="block-label gray">关键词</div>
      ${toPills(d.keywords)}
    </div>
    <div class="block">
      <div class="block-label orange">认知升级</div>
      <div class="highlight">${safe(d.cognition) || '<span class="empty">无</span>'}</div>
    </div>
    <div class="block">
      <div class="block-label red">核心决策</div>
      ${toList(d.decisions)}
    </div>
    <div class="block">
      <div class="block-label blue">T+0 待办</div>
      ${toList(d.todo)}
    </div>
    ${d.unsolved ? `<div class="block"><div class="block-label gray">未解决问题</div><div class="text-block">${toParas(d.unsolved)}</div></div>` : ''}
  `;
}

function renderPatrol(d) {
  if (!d) return '<div class="error-box">今日巡检数据缺失</div>';
  return `
    ${d.headline ? `<div class="block"><div class="highlight">${safe(d.headline).replace(/\n---\s*$/, '').trim()}</div></div>` : ''}
    ${d.leverage ? `<div class="block"><div class="block-label orange">今日杠杆点</div><div class="text-block">${toParas(d.leverage)}</div></div>` : ''}
    ${d.contradiction ? `<div class="block"><div class="block-label red">矛盾</div><div class="text-block">${toParas(d.contradiction)}</div></div>` : ''}
    ${d.avoidance ? `<div class="block"><div class="block-label red">在回避什么</div><div class="text-block">${toParas(d.avoidance)}</div></div>` : ''}
    ${d.trajectory ? `<div class="block"><div class="block-label blue">7 天轨迹</div><div class="text-block">${toParas(d.trajectory)}</div></div>` : ''}
    ${d.upgrade ? `<div class="block"><div class="block-label green">我的升级点</div><div class="text-block">${toParas(d.upgrade)}</div></div>` : ''}
  `;
}

function renderLearn(d) {
  if (!d) return '<div class="block"><div class="empty">今日外部学习尚未完成，10:17 后自动更新。</div></div>';
  return `
    ${d.direction ? `<div class="block"><div class="block-label green">今日学习方向</div><div class="highlight green">${safe(d.direction)}</div></div>` : ''}
    ${d.findings ? `<div class="block"><div class="block-label blue">重点发现</div><div class="text-block">${toParas(d.findings)}</div></div>` : ''}
    ${d.blind_spots ? `<div class="block"><div class="block-label gray">认知盲区</div><div class="text-block">${toParas(d.blind_spots)}</div></div>` : ''}
    ${d.tools ? `<div class="block"><div class="block-label orange">值得学的工具</div><div class="text-block">${toParas(d.tools)}</div></div>` : ''}
    ${d.actions ? `<div class="block"><div class="block-label red">关键行动项</div>${toList(d.actions)}</div>` : ''}
  `;
}

async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('数据加载失败');
    const d = await res.json();

    document.getElementById('hdr-date').textContent = d.date || '';
    document.title = `每日简报 · ${d.date || ''}`;

    app.innerHTML = `
      <div id="panel-digest" class="tab-panel active">${renderDigest(d.digest)}</div>
      <div id="panel-patrol" class="tab-panel">${renderPatrol(d.patrol)}</div>
      <div id="panel-learn" class="tab-panel">${renderLearn(d.learn)}</div>
    `;
    switchTab(currentTab);
  } catch(e) {
    app.innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
    document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  }
}

load();
</script>
</body>
</html>
